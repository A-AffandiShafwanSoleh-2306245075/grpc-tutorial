syntax = "proto3";
package services;

// 1. Unary: Client mengirim 1 request, Server membalas 1 response
service PaymentService {
    rpc ProcessPayment (PaymentRequest) returns (PaymentResponse);
}

// 2. Server Streaming: Client mengirim 1 request, Server mengirim aliran data
service TransactionService {
    rpc GetTransactionHistory (TransactionRequest) returns (stream TransactionResponse);
}

// 3. Bi-Directional Streaming: Client dan Server saling mengirim aliran data
service ChatService {
    rpc Chat (stream ChatMessage) returns (stream ChatMessage);
}

message PaymentRequest {
    string user_id = 1;
    double amount = 2;
}

message PaymentResponse {
    bool success = 1;
}

message TransactionRequest {
    string user_id = 1;
}

message TransactionResponse {
    string transaction_id = 1;
    string status = 2;
    double amount = 3;
    string timestamp = 4;
}

message ChatMessage {
    string user_id = 1;
    string message = 2;
}